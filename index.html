<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>The Mortgage Geek | Mortgages Demystified</title>
    <meta name="description" content="Mortgages demystified. Everything you need to understand the mortgage process — from first conversation to closing day. Compare Conventional, FHA, and VA loans side by side." />

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Icons -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="/icon-192.png" />
    <link rel="apple-touch-icon" sizes="512x512" href="/icon-512.png" />

    <!-- iOS Web App -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Mortgage Geek" />

    <!-- Android / Chrome -->
    <meta name="theme-color" content="#0F2530" />
    <meta name="application-name" content="Mortgage Geek" />

    <!-- Open Graph (for sharing on social / text messages) -->
    <meta property="og:title" content="The Mortgage Geek | Mortgages Demystified" />
    <meta property="og:description" content="Mortgages demystified. Compare Conventional, FHA, and VA mortgage payments side by side with live rates. Built by a loan originator with 12+ years of experience." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://mortgagegeek.ai" />
    <meta property="og:image" content="https://mortgagegeek.ai/icon-512.png" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="The Mortgage Geek | Mortgages Demystified" />
    <meta name="twitter:description" content="Mortgages demystified. Side-by-side payment calculator with live rates." />
    <meta name="twitter:image" content="https://mortgagegeek.ai/icon-512.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>

    <!-- Register Service Worker for PWA / offline support -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/service-worker.js').catch((err) => {
            console.warn('Service worker registration failed:', err);
          });
        });
      }
    </script>
  </body>
</html>
